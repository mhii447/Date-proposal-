<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, pink, lightcoral);
    }
    h1 {
      margin-top: 100px;
    }
    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Hey ❤️</h1>
<p>I made this just for you...</p>
<h2>Will you be my Valentine? 💌</h2>

<button onclick="yes()">Yes 😍</button>
<button onclick="no()">No 😅</button>

<script>
function yes() {
  alert("You just made me so happy 🥺❤️");
}

function no() {
  alert("Hmm… try that again 😌");
}
</script>

</body>
</html>
